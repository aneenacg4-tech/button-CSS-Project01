<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>button</title>
</head>
<body>
    <div class="min-h-screen bg-stone-500 flex justify-center items-center h-screen">
        <div class="container bg-black p-7 flex gap-6 flex-wrap w-[650px] justify-center ">
        <button class="text-white bg-pink-500 py-2 px-6">signup</button>
        <button class="border-2 border-pink-500 text-pink-500 py-2 px-6 rounded-none text-base">Link <i class="fa-solid fa-link"></i></button>
        <button class="text-white bg-yellow-600 py-2 px-6 rounded-md">Login <i class="fa-solid fa-link"></i></button>
        <button class="text-yellow-600 border-2 border-yellow-600  py-2 px-6 rounded-md">search <i class="fa-solid fa-magnifying-glass"></i></button>
        <button class="text-black bg-green-600 py-2 px-6 rounded-md"><i class="fa-solid fa-circle" style="color: rgb(10, 67, 47);"></i>Link05</button>
         
        <button class="text-green-500 border-2 border-green-600 py-2 px-6 rounded-md"><i class="fa-solid fa-circle" style="color: rgb(10, 67, 47);"></i>Link06</button>
        <button class="text-white px-6 py-2 bg-gradient-to-r from-blue-500 to-purple-800">Playnow<i class="fa-solid fa-play" style="color: rgb(255, 255, 255);"></i></button>
        <button class="text-white bg-blue-500 py-2 px-6">More articles<i class="fa-solid fa-arrow-right"></i></button>
        <!-- starred -->
         <div class="border text-white flex items-center">
            <span class="px-4  h-full flex items-center text-yellow-600"><i class="fa-solid fa-star" style="color: rgb(201, 163, 25);"></i></i>starred</span>
            <span class="px-2 border-l h-full flex items-center"><i class="fa-solid fa-arrow-down" style="color: rgb(227, 226, 222);"></i></span>
          
           
           
            
         </div>
          <!-- cart button -->
        <div class=" relative cursor-pointer hover:bg-red-500">
         <i class="fa-solid fa-cart-shopping text-4xl mt-2" style="color: #e2e5e9;"></i>
          <span class=" bg-red-500 px-1 rounded-full text-xs absolute top-0 left-7">9</span>

        </div>

         <button class="px-8 py-2 bg-white text-black border-3 rounded-full cursor-pointer hover:bg-blue-200"><i class="fa-solid fa-circle" style="color: #202122;"></i> Light</button>

         <button class="border-3 px-6 py-2 bg-black rounded-full cursor-pointer hover:bg-blue-200"><i class="fa-solid fa-circle"></i> Dark</button>

        

     
     
       
        </div>

        
      </div>
          
       
    
</body>
</html>
